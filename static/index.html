<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DocRAG</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif; box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #F0F2F5; color: #1A2132; overflow: hidden; }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #C4CCDA; border-radius: 99px; }

    .dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:#8C97AB; animation:blink 1.4s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay:.2s; }
    .dot:nth-child(3) { animation-delay:.4s; }
    @keyframes blink { 0%,80%,100%{opacity:.2;transform:scale(.75);} 40%{opacity:1;transform:scale(1);} }

    @keyframes msgIn { from{opacity:0;transform:translateY(6px);} to{opacity:1;transform:translateY(0);} }
    .msg-in { animation: msgIn .2s ease both; }

    /* ─── COMPOSER ─────────────────────────────────────────────────────
       One element. Starts at 42% from top (visually centered accounting
       for content above). Transitions to docked at bottom.          */
    #composer-outer {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      padding: 0 24px;
      z-index: 30;

      /* centered position */
      top: 52%;
      transition: top .45s cubic-bezier(.4,0,.2,1);
    }
    #composer-outer.docked {
      top: auto;
      bottom: 28px;
      transition: none; /* already at bottom after animation */
    }

    /* ─── EMPTY CONTENT (above composer) ────────────────────────────── */
    #empty-content {
      position: fixed;
      left: 50%;
      transform: translateX(-50%);
      width: 100%;
      max-width: 600px;
      padding: 0 24px;
      z-index: 20;

      /* sits above composer — bottom edge aligns with composer top */
      top: 0;
      bottom: 52%;       /* mirror of composer top, so it ends where composer starts */
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-end;
      padding-bottom: 20px;
      text-align: center;

      transition: opacity .25s ease;
    }
    #empty-content.gone { opacity: 0; pointer-events: none; }

    /* ─── CHAT SCROLL ──────────────────────────────────────────────── */
    #chat-scroll {
      position: fixed;
      inset: 0;
      overflow-y: auto;
      padding: 40px 0 130px;
      opacity: 0;
      pointer-events: none;
      transition: opacity .3s ease .15s;
    }
    #chat-scroll.visible { opacity: 1; pointer-events: auto; }
    #messages { max-width: 660px; margin: 0 auto; padding: 0 24px; }

    /* ─── COMPOSER BOX ─────────────────────────────────────────────── */
    .cbox {
      background: #fff;
      border: 1px solid #D5DBE5;
      border-radius: 18px;
      box-shadow: 0 2px 12px rgba(26,33,50,.08);
      transition: border-color .15s;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      padding: 10px 12px;
    }
    .cbox:focus-within { border-color: #6B8DB5; }
    textarea { resize: none; background: transparent; outline: none; }

    /* suggestions */
    .sug {
      width: 100%; text-align: left; padding: 12px 16px;
      border-radius: 14px; border: 1px solid #D5DBE5;
      font-size: 13px; color: #4A566D; background: transparent;
      cursor: pointer; transition: background .15s, border-color .15s;
    }
    .sug:hover { background: #E4E8EF; border-color: #B0BCCE; }

    /* pills */
    .pill {
      display:inline-flex; align-items:center; gap:6px;
      background:#E4E8EF; border:1px solid #C4CCDA;
      border-radius:6px; padding:3px 8px 3px 9px;
      font-size:11px; color:#4A566D; max-width:200px;
    }
    .pill span { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .pill button { color:#8C97AB; line-height:1; flex-shrink:0; cursor:pointer; }

    .src-chip { font-size:10px; background:#EEF1F6; border:1px solid #D5DBE5; border-radius:4px; padding:2px 8px; color:#4A566D; }

    /* drop overlay */
    #drop-overlay { display:none; position:fixed; inset:0; z-index:50; background:rgba(240,242,245,.94); align-items:center; justify-content:center; flex-direction:column; pointer-events:none; }
    #drop-overlay.on { display:flex; }

    /* status */
    #status { position:fixed; top:16px; right:20px; display:none; align-items:center; gap:12px; font-size:11px; color:#8C97AB; z-index:40; }
  </style>
</head>
<body>

<!-- Drop overlay -->
<div id="drop-overlay">
  <div style="border:2px dashed #B0BCCE;border-radius:16px;padding:40px 56px;text-align:center;">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#8C97AB" stroke-width="1.5" style="margin:0 auto 10px;display:block;">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <p style="font-size:13px;color:#4A566D;font-weight:500;">Drop PDFs here</p>
  </div>
</div>

<!-- Status badge -->
<div id="status">
  <span id="idx-badge" style="display:none;align-items:center;gap:6px;">
    <span style="width:6px;height:6px;border-radius:50%;background:#4A90D9;display:inline-block;"></span>
    <span id="idx-text"></span>
  </span>
  <button onclick="clearSession()" id="clear-btn" style="display:none;color:#8C97AB;font-size:11px;cursor:pointer;transition:color .15s;"
          onmouseover="this.style.color='#1A2132'" onmouseout="this.style.color='#8C97AB'">Clear</button>
</div>

<!-- Empty content (above composer) -->
<div id="empty-content">
  <div style="width:56px;height:56px;border-radius:16px;background:#E4E8EF;display:flex;align-items:center;justify-content:center;margin-bottom:18px;">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="#6B7D96" stroke-width="1.6">
      <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
      <polyline points="14 2 14 8 20 8"/>
      <line x1="16" y1="13" x2="8" y2="13"/>
      <line x1="16" y1="17" x2="8" y2="17"/>
    </svg>
  </div>
  <p style="font-size:23px;font-weight:600;color:#1A2132;margin-bottom:9px;letter-spacing:-.02em;">Ask your documents</p>
  <p style="font-size:13.5px;color:#8C97AB;line-height:1.7;margin-bottom:24px;max-width:290px;">
    Tap <strong style="color:#4A566D;font-weight:500;">+</strong> to attach PDFs, build the index, then start asking.
  </p>
  <div style="width:100%;display:flex;flex-direction:column;gap:7px;">
    <button class="sug" onclick="usePrompt('Ringkas isi dari dokumen ini')">Ringkas isi dari dokumen ini</button>
    <button class="sug" onclick="usePrompt('Apa perbedaan utama antara metode yang dibahas?')">Apa perbedaan utama antara metode yang dibahas?</button>
    <button class="sug" onclick="usePrompt('What are the key findings in this paper?')">What are the key findings in this paper?</button>
  </div>
</div>

<!-- Chat messages -->
<div id="chat-scroll">
  <div id="messages"></div>
</div>

<!-- THE one composer -->
<div id="composer-outer">
  <div style="display:flex;flex-direction:column;gap:8px;">

    <!-- pills -->
    <div id="pills" style="display:none;flex-wrap:wrap;gap:6px;padding:0 2px;"></div>

    <!-- build bar -->
    <div id="build-bar" style="display:none;align-items:center;justify-content:space-between;
         background:#E4E8EF;border:1px solid #C4CCDA;border-radius:12px;padding:10px 14px;">
      <p style="font-size:12px;color:#4A566D;">
        <span id="build-count" style="font-weight:500;color:#1A2132;"></span> ready to index
      </p>
      <button id="build-btn" onclick="buildIndex()"
              style="font-size:12px;font-weight:500;color:#fff;background:#1E3A5F;
                     border-radius:9px;padding:6px 14px;cursor:pointer;transition:background .15s;"
              onmouseover="this.style.background='#2A4E7C'" onmouseout="this.style.background='#1E3A5F'">
        Build Index
      </button>
    </div>

    <!-- input box -->
    <div class="cbox">
      <button onclick="document.getElementById('file-input').click()" title="Attach PDFs"
              style="flex-shrink:0;width:28px;height:28px;border-radius:8px;color:#8C97AB;
                     display:flex;align-items:center;justify-content:center;margin-bottom:2px;
                     cursor:pointer;transition:background .15s,color .15s;"
              onmouseover="this.style.background='#E4E8EF';this.style.color='#1A2132';"
              onmouseout="this.style.background='transparent';this.style.color='#8C97AB';">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
      <input id="file-input" type="file" accept=".pdf" multiple style="display:none;" onchange="handleFileSelect(event)" />

      <textarea id="qi" rows="1"
                placeholder="Ask anything about your documents..."
                onkeydown="handleKD(event)" oninput="ar(this)" disabled
                style="flex:1;font-size:13.5px;color:#1A2132;line-height:1.6;
                       padding:2px 0;max-height:144px;overflow-y:auto;
                       opacity:.35;cursor:not-allowed;"></textarea>

      <button id="sb" onclick="sendQuery()" disabled
              style="flex-shrink:0;width:28px;height:28px;border-radius:8px;background:#1E3A5F;
                     color:#fff;display:flex;align-items:center;justify-content:center;
                     margin-bottom:2px;cursor:pointer;opacity:.25;transition:background .15s;"
              onmouseover="if(!this.disabled)this.style.background='#2A4E7C';"
              onmouseout="this.style.background='#1E3A5F';">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

  </div>
</div>

<script>
  let sessionId = null, pendingFiles = [], isLoading = false, isIndexed = false, chatStarted = false;

  // drag & drop
  document.body.addEventListener('dragover', e => { e.preventDefault(); document.getElementById('drop-overlay').classList.add('on'); });
  document.body.addEventListener('dragleave', e => { if (!e.relatedTarget) document.getElementById('drop-overlay').classList.remove('on'); });
  document.body.addEventListener('drop', e => {
    e.preventDefault(); document.getElementById('drop-overlay').classList.remove('on');
    addFiles([...e.dataTransfer.files].filter(f => f.name.toLowerCase().endsWith('.pdf')));
  });

  function handleFileSelect(e) { addFiles([...e.target.files]); e.target.value = ''; }
  function addFiles(files) { files.forEach(f => { if (!pendingFiles.find(p => p.name===f.name)) pendingFiles.push(f); }); renderPills(); }
  function removeFile(name) { pendingFiles = pendingFiles.filter(f => f.name!==name); renderPills(); }

  function renderPills() {
    const row=document.getElementById('pills'), bar=document.getElementById('build-bar'), cnt=document.getElementById('build-count');
    if (!pendingFiles.length) { row.style.display='none'; if (!isIndexed) bar.style.display='none'; return; }
    row.style.display='flex';
    row.innerHTML=pendingFiles.map(f=>`<span class="pill">
      <svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="#8C97AB" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
      <span title="${f.name}">${f.name}</span>
      <button onclick="removeFile('${f.name}')"><svg width="9" height="9" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg></button>
    </span>`).join('');
    bar.style.display='flex';
    cnt.textContent=`${pendingFiles.length} PDF${pendingFiles.length>1?'s':''}`;
  }

  async function buildIndex() {
    if (!pendingFiles.length) return;
    const btn=document.getElementById('build-btn');
    btn.textContent='Building...'; btn.disabled=true;
    const form=new FormData();
    pendingFiles.forEach(f=>form.append('files',f));
    try {
      const res=await fetch('/api/upload',{method:'POST',body:form});
      const data=await res.json();
      if (!res.ok) throw new Error(data.detail||'Upload failed');
      sessionId=data.session_id; isIndexed=true;

      // show status
      const st=document.getElementById('status'); st.style.display='flex';
      const ib=document.getElementById('idx-badge'); ib.style.display='flex';
      document.getElementById('idx-text').textContent=`${data.files.length} file${data.files.length>1?'s':''} indexed`;
      document.getElementById('clear-btn').style.display='inline';

      // enable input
      setInput(true);

      document.getElementById('build-bar').style.display='none';
      document.getElementById('pills').style.display='none';
      pendingFiles=[];

      // switch to chat
      switchChat();
      appendSystem(`Index ready — ${data.files.join(', ')}`);
    } catch(err) { switchChat(); appendSystem(`Error: ${err.message}`); }
    finally { btn.textContent='Build Index'; btn.disabled=false; }
  }

  function setInput(on) {
    const qi=document.getElementById('qi'), sb=document.getElementById('sb');
    qi.disabled=!on; qi.style.opacity=on?'1':'.35'; qi.style.cursor=on?'text':'not-allowed';
    sb.disabled=!on; sb.style.opacity=on?'1':'.25';
  }

  function switchChat() {
    if (chatStarted) return;
    chatStarted=true;

    // fade out empty content
    document.getElementById('empty-content').classList.add('gone');

    // animate composer to bottom
    const co=document.getElementById('composer-outer');
    // Use requestAnimationFrame to let browser paint current state first
    requestAnimationFrame(()=>{
      requestAnimationFrame(()=>{
        co.style.transition='top .45s cubic-bezier(.4,0,.2,1)';
        co.style.top='auto';
        co.style.bottom='28px';
      });
    });

    // show messages
    setTimeout(()=>{
      document.getElementById('chat-scroll').classList.add('visible');
      document.getElementById('qi').focus();
    }, 350);
  }

  function handleKD(e) { if (e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendQuery();} }
  function ar(el) { el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,144)+'px'; }
  function usePrompt(t) { const el=document.getElementById('qi'); el.value=t; ar(el); }

  async function sendQuery() {
    if (!sessionId||isLoading) return;
    const qi=document.getElementById('qi');
    const query=qi.value.trim(); if (!query) return;
    qi.value=''; qi.style.height='auto';
    if (!chatStarted) switchChat();
    appendUser(query);
    const tid=appendTyping();
    isLoading=true; setInput(false);
    try {
      const res=await fetch('/api/query',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session_id:sessionId,query})});
      const data=await res.json();
      if (!res.ok) throw new Error(data.detail||'Query failed');
      removeEl(tid); appendAssistant(data);
    } catch(err) { removeEl(tid); appendSystem(`Error: ${err.message}`); }
    finally { isLoading=false; setInput(true); document.getElementById('qi').focus(); }
  }

  function appendUser(t) {
    const d=mk('div','msg-in','display:flex;justify-content:flex-end;margin-bottom:16px;');
    d.innerHTML=`<div style="max-width:72%;background:#1E3A5F;color:#F0F4FA;border-radius:18px 18px 4px 18px;padding:10px 16px;font-size:13.5px;line-height:1.6;">${esc(t)}</div>`;
    app(d);
  }

  function appendAssistant(data) {
    const d=mk('div','msg-in','display:flex;justify-content:flex-start;margin-bottom:16px;');
    let planH='';
    if (data.plan?.length) planH=`<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:1px solid #E4E8EF;"><p style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#8C97AB;font-weight:500;margin-bottom:8px;">Plan</p><ol style="list-style:none;display:flex;flex-direction:column;gap:4px;">${data.plan.map((p,i)=>`<li style="display:flex;gap:8px;font-size:12px;color:#4A566D;line-height:1.5;"><span style="color:#B0BCCE;flex-shrink:0;width:16px;">${i+1}.</span><span>${esc(p)}</span></li>`).join('')}</ol></div>`;
    let srcH='';
    if (data.sources?.length) srcH=`<div style="margin-top:12px;padding-top:12px;border-top:1px solid #E4E8EF;"><p style="font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:#8C97AB;font-weight:500;margin-bottom:6px;">Sources</p><div style="display:flex;flex-wrap:wrap;gap:6px;">${data.sources.map(s=>`<span class="src-chip">${esc(s)}</span>`).join('')}</div></div>`;
    d.innerHTML=`<div style="max-width:80%;"><div style="background:#fff;border:1px solid #D5DBE5;border-radius:18px 18px 18px 4px;padding:14px 18px;font-size:13.5px;color:#1A2132;line-height:1.65;box-shadow:0 1px 4px rgba(26,33,50,.07);">${planH}<div>${fmt(data.answer)}</div>${srcH}</div><p style="font-size:10px;color:#B0BCCE;margin-top:5px;margin-left:4px;">${data.type==='summary'?'Summary':'Detail'} &middot; ${data.router}</p></div>`;
    app(d);
  }

  function appendSystem(t) {
    const d=mk('div','msg-in','display:flex;justify-content:center;margin-bottom:14px;');
    d.innerHTML=`<p style="font-size:11px;color:#8C97AB;background:#E4E8EF;border:1px solid #C4CCDA;border-radius:99px;padding:3px 14px;">${esc(t)}</p>`;
    app(d);
  }

  let tc=0;
  function appendTyping() {
    const id='ty'+(++tc), d=mk('div','','display:flex;justify-content:flex-start;margin-bottom:16px;');
    d.id=id;
    d.innerHTML=`<div style="background:#fff;border:1px solid #D5DBE5;border-radius:18px 18px 18px 4px;padding:12px 16px;display:inline-flex;gap:5px;align-items:center;box-shadow:0 1px 4px rgba(26,33,50,.07);"><span class="dot"></span><span class="dot"></span><span class="dot"></span></div>`;
    app(d); return id;
  }

  function mk(tag, cls, style) { const el=document.createElement(tag); if(cls)el.className=cls; if(style)el.style.cssText=style; return el; }
  function app(d) { document.getElementById('messages').appendChild(d); document.getElementById('chat-scroll').scrollTop=9999; }
  function removeEl(id) { document.getElementById(id)?.remove(); }

  function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
  function fmt(s) {
    const lines=String(s).split('\n'); let html='', inList=false;
    for (let line of lines) {
      line=line.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\*(.+?)\*/g,'<em>$1</em>');
      if (/^####\s+/.test(line)) { if(inList){html+='</ul>';inList=false;} html+=`<p style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:#8C97AB;margin:16px 0 5px;">${line.replace(/^####\s+/,'')}</p>`; continue; }
      if (/^###\s+/.test(line))  { if(inList){html+='</ul>';inList=false;} html+=`<p style="font-size:15px;font-weight:600;color:#1A2132;margin:18px 0 6px;">${line.replace(/^###\s+/,'')}</p>`; continue; }
      if (/^##\s+/.test(line))   { if(inList){html+='</ul>';inList=false;} html+=`<p style="font-size:16px;font-weight:700;color:#1A2132;margin:20px 0 8px;">${line.replace(/^##\s+/,'')}</p>`; continue; }
      if (/^[-*]\s+/.test(line)) { if(!inList){html+='<ul style="list-style:none;margin:6px 0;padding:0;display:flex;flex-direction:column;gap:4px;">';inList=true;} html+=`<li style="display:flex;gap:8px;font-size:13.5px;color:#1A2132;line-height:1.65;"><span style="color:#B0BCCE;flex-shrink:0;margin-top:3px;">&ndash;</span><span>${line.replace(/^[-*]\s+/,'')}</span></li>`; continue; }
      if (/^\d+\.\s+/.test(line)){ if(!inList){html+='<ul style="list-style:none;margin:6px 0;padding:0;display:flex;flex-direction:column;gap:4px;">';inList=true;} const n=line.match(/^(\d+)\./)[1]; html+=`<li style="display:flex;gap:8px;font-size:13.5px;color:#1A2132;line-height:1.65;"><span style="color:#B0BCCE;flex-shrink:0;min-width:18px;">${n}.</span><span>${line.replace(/^\d+\.\s+/,'')}</span></li>`; continue; }
      if (inList){html+='</ul>';inList=false;}
      if (line.trim()===''){html+='<div style="height:8px;"></div>';continue;}
      html+=`<p style="margin:0 0 4px;font-size:13.5px;color:#1A2132;line-height:1.65;">${line}</p>`;
    }
    if (inList) html+='</ul>';
    return html;
  }

  async function clearSession() {
    if (sessionId) { await fetch(`/api/session/${sessionId}`,{method:'DELETE'}).catch(()=>{}); sessionId=null; }
    isIndexed=false; pendingFiles=[]; chatStarted=false; isLoading=false;
    document.getElementById('status').style.display='none';
    document.getElementById('idx-badge').style.display='none';
    document.getElementById('clear-btn').style.display='none';
    document.getElementById('messages').innerHTML='';
    document.getElementById('chat-scroll').classList.remove('visible');
    document.getElementById('empty-content').classList.remove('gone');
    // reset composer position
    const co=document.getElementById('composer-outer');
    co.style.transition='none'; co.style.top='52%'; co.style.bottom='';
    setInput(false);
  }
</script>
</body>
</html>
